name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-smoke:
    name: pytest (unit + import smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CUDA_VISIBLE_DEVICES: ""
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Unit tests
        run: python -m pytest tests/unit -q --ignore=tests/unit/test_import_smoke.py

      - name: Import smoke
        run: python -m pytest tests/unit/test_import_smoke.py -q
